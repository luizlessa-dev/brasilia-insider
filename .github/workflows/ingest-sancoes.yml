name: Ingestão Sanções (CEIS + CNEP)

# Cadência: mensal (dados atualizados mensalmente pela CGU).
# Full reload na 1ª segunda de cada mês; incremental nos demais.
#
# Secrets necessários:
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   PORTAL_TRANSPARENCIA_API_KEY   ← registrar em portaldatransparencia.gov.br/api-de-dados/cadastrar-email
#
# Volume estimado: CEIS ~30k registros + CNEP ~20k registros
# Tempo estimado: ~15-30 min (paginação com throttle 0.5s/pág)

on:
  schedule:
    # Full: primeira segunda do mês, 07:00 UTC
    - cron: "0 7 1-7 * 1"
  workflow_dispatch:
    inputs:
      dataset:
        description: "Dataset a ingerir"
        type: choice
        options:
          - todos
          - ceis
          - cnep
        default: todos
      desde:
        description: "Ingestão incremental a partir de (AAAA-MM-DD). Vazio = full."
        default: ""

concurrency:
  group: ingest-sancoes
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PORTAL_TRANSPARENCIA_API_KEY: ${{ secrets.PORTAL_TRANSPARENCIA_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r ingestao/requirements.txt

      - name: Ingerir sanções
        run: |
          DATASET="${{ github.event.inputs.dataset || 'todos' }}"
          DESDE="${{ github.event.inputs.desde }}"
          ARGS="--dataset $DATASET"
          if [ -n "$DESDE" ]; then
            ARGS="$ARGS --desde $DESDE"
          fi
          python -m ingestao.cgu.sancoes_runner $ARGS
