name: Ingestão SIAFI mensal

# Cadência: 1x/mês, dia 20 às 09:00 UTC (06:00 BRT).
# Por que dia 20: Portal da Transparência publica execução mensal com lag
# típico de ~17 dias (validado 2026-06-02). Dia 20 dá folga de 2-3 dias.
#
# Por que UTC 09: evita pico do GitHub Actions (00-06 UTC).
#
# Refresh policy: ingerir SEMPRE o mês mais recente publicado + revalidar
# os últimos 24 meses (CGU corrige histórico — observado em 2026-05).

on:
  schedule:
    - cron: "0 9 20 * *"   # dia 20 às 09:00 UTC
  workflow_dispatch:
    inputs:
      modo:
        description: "Modo de execução"
        type: choice
        options: [incremental, revalidate, backfill]
        default: incremental
      competencia:
        description: "Competência única (YYYY-MM) — só pra modo backfill"
        required: false
      janela_revalidacao:
        description: "Quantos meses revalidar (modo revalidate)"
        default: "24"

concurrency:
  group: ingest-siafi-mensal
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r ingestao/requirements.txt

      - name: Ingerir SIAFI (modo ${{ github.event.inputs.modo || 'incremental' }})
        run: |
          python -m ingestao.lake.siafi.cron \
            --modo "${{ github.event.inputs.modo || 'incremental' }}" \
            ${{ github.event.inputs.competencia && format('--competencia {0}', github.event.inputs.competencia) || '' }} \
            --janela-revalidacao "${{ github.event.inputs.janela_revalidacao || '24' }}"
